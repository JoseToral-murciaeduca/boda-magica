<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmación de Asistencia - Boda Mágica</title>
    <link rel="stylesheet" href="css/style.css"> <style>
    body { background-color: #1a0f10; }
    .pergamino {
        background: #f4ebe1;
        background-image: radial-gradient(circle at 50% 50%, #fcf8f2 0%, #edf2e5 100%);
        border: 2px solid #d3a625;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.6), inset 0 0 40px #dfd3c3;
        padding: 40px;
        max-width: 550px;
        width: 100%;
        border-radius: 4px;
        position: relative;
        color: #3d2612;
        text-align: left;
    }
    .pergamino h2 { text-align: center; color: #740001; }
    .subtitulo { text-align: center; font-style: italic; margin-bottom: 30px; }
    .grupo-campo { margin-bottom: 20px; }
    label { display: block; font-weight: bold; margin-bottom: 8px; color: #4a0002; font-family: 'Georgia', serif;}
    input[type="text"], input[type="number"], textarea {
        width: 100%; padding: 10px; border: 1px solid #c5b39a; background: rgba(255,255,255,0.6);
        border-radius: 3px; box-sizing: border-box; font-family: 'Georgia', serif;
    }
    .opciones-radio label { font-weight: normal; cursor: pointer; display: flex; align-items: center; gap: 5px; margin-bottom: 5px;}

    @media screen and (max-width: 600px) {
        body { padding: 15px; align-items: flex-start; }
        .pergamino { padding: 25px 15px; }
        input[type="text"], input[type="number"], textarea { font-size: 16px; padding: 12px; }
    }
</style>
</head>
<body>

<div class="pergamino">
    <h2>Registro en el Libro de Honor</h2>
    <div class="grupo-campo">
        <label for="nombre">Nombre y Apellidos del invitado:</label>
        <input type="text" id="nombre" name="nombre" placeholder="Ej. Sirius Black" required>
    </div>

    <div class="grupo-campo">
        <label>¿Asistirás al banquete de gala?</label>
        <div class="opciones-radio">
            <label><input type="radio" name="asistencia" value="Asistirá" checked required> Acepto con honor</label>
            <label><input type="radio" name="asistencia" value="No Asistirá"> Lamento no poder asistir</label>
        </div>
    </div>

    <div class="grupo-campo">
        <label for="acompanantes">¿Cuántos magos/brujas te acompañan? (Incluyendo niños):</label>
        <input type="number" id="acompanantes" name="acompanantes" min="0" max="10" value="0">
    </div>

    <div class="grupo-campo">
        <label>Test del Sombrero Seleccionador (Para tu mesa):</label>
        <div class="test-sombrero">
            <div class="pregunta-test">
                <strong>1. ¿Qué cualidad mágica te define más?</strong>
                <div class="opciones-radio">
                    <label><input type="radio" name="q1" value="G" required> Valentía y Coraje</label>
                    <label><input type="radio" name="q1" value="S"> Astucia y Ambición</label>
                    <label><input type="radio" name="q1" value="R"> Inteligencia y Creatividad</label>
                    <label><input type="radio" name="q1" value="H"> Lealtad y Trabajo duro</label>
                </div>
            </div>
            <div class="pregunta-test">
                <strong>2. ¿Qué prefieres hacer el domingo?</strong>
                <div class="opciones-radio">
                    <label><input type="radio" name="q2" value="G" required> Ir a la aventura sin planear</label>
                    <label><input type="radio" name="q2" value="S"> Ganar en juegos de mesa</label>
                    <label><input type="radio" name="q2" value="R"> Leer un buen libro</label>
                    <label><input type="radio" name="q2" value="H"> Cuidar las plantas o animales</label>
                </div>
            </div>

            <button type="button" onclick="asignarCasa()" class="btn-magico" style="font-size: 16px; padding: 5px 15px; width: 100%;">¡Sombrero, elige!</button>

            <div id="resultado-sombrero" class="resultado-casa"></div>

            <input type="hidden" id="casa-asignada" name="casa_hogwarts" value="No asignada">
        </div>
    </div>

    <div class="grupo-campo">
        <label for="restricciones">¿Alergias o pociones prohibidas?</label>
        <textarea id="restricciones" name="restricciones_alimenticias" rows="2" placeholder="Ej. Menú infantil, celiaco, etc."></textarea>
    </div>

    <button type="submit" class="btn-magico" style="width: 100%;">Enviar Lechuza (Confirmar)</button>
    </form>
</div>

<script>
    function asignarCasa() {
        const form = document.getElementById('form-rsvp');
        const q1 = form.querySelector('input[name="q1"]:checked');
        const q2 = form.querySelector('input[name="q2"]:checked');
        const resultadoDiv = document.getElementById('resultado-sombrero');
        const inputOculto = document.getElementById('casa-asignada');

        if (!q1 || !q2) {
            alert('¡El Sombrero necesita que respondas a las dos preguntas!');
            return;
        }

        // Lógica simple de asignación
        let puntos = { 'G': 0, 'S': 0, 'R': 0, 'H': 0 };
        puntos[q1.value]++;
        puntos[q2.value]++;

        let casaGanadora = '';
        let maxPuntos = -1;

        // Encontrar la casa con más puntos (o la primera si hay empate)
        for (let casa in puntos) {
            if (puntos[casa] > maxPuntos) {
                maxPuntos = puntos[casa];
                casaGanadora = casa;
            }
        }

        // Asignar colores y nombres
        let nombreCasa, colorFondo;
        switch(casaGanadora) {
            case 'G': nombreCasa = 'Gryffindor'; colorFondo = '#740001'; break;
            case 'S': nombreCasa = 'Slytherin'; colorFondo = '#1a472a'; break;
            case 'R': nombreCasa = 'Ravenclaw'; colorFondo = '#0e1a40'; break;
            case 'H': nombreCasa = 'Hufflepuff'; colorFondo = '#eeba30'; break;
        }

        // Mostrar el resultado
        resultadoDiv.textContent = '¡' + nombreCasa.toUpperCase() + '!';
        resultadoDiv.style.backgroundColor = colorFondo;
        if(casaGanadora === 'H') resultadoDiv.style.color = '#3d2612'; // Texto oscuro para fondo amarillo
        else resultadoDiv.style.color = 'white';

        resultadoDiv.style.display = 'block';

        // Guardar para Formspree
        inputOculto.value = nombreCasa;
    }
</script>
</body>
</html>
