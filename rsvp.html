<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmación de Asistencia - Boda Mágica</title>
    <style>
        /* Estilos Generales Tematizados */
        body {
            background-color: #1a0f10; /* Fondo oscuro místico */
            font-family: 'Georgia', serif;
            color: #3d2612;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Contenedor estilo Pergamino Antiguo */
        .pergamino {
            background: #f4ebe1;
            background-image: radial-gradient(circle at 50% 50%, #fcf8f2 0%, #edf2e5 100%);
            border: 2px solid #d3a625; /* Borde Dorado */
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.6), inset 0 0 40px #dfd3c3;
            padding: 40px;
            max-width: 550px;
            width: 100%;
            border-radius: 4px;
            position: relative;
        }

        .pergamino::before {
            content: '';
            position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;
            border: 1px solid #740001; /* Línea fina Burdeos */
            pointer-events: none;
            opacity: 0.5;
        }

        h2 {
            text-align: center;
            color: #740001; /* Burdeos */
            font-size: 24px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitulo {
            text-align: center;
            font-style: italic;
            color: #5c4033;
            margin-bottom: 30px;
            font-size: 14px;
        }

        /* Estructura del Formulario */
        .grupo-campo {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #4a0002;
            font-size: 15px;
        }

        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #c5b39a;
            background-color: rgba(255, 255, 255, 0.6);
            font-family: 'Georgia', serif;
            font-size: 14px;
            color: #2b1a0a;
            border-radius: 3px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #740001;
            background-color: #ffffff;
            box-shadow: 0 0 5px rgba(116, 0, 1, 0.2);
        }

        /* Opciones de Radio Tematizadas */
        .opciones-radio {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }

        .opciones-radio label {
            font-weight: normal;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Botón de Envío (Hechizo) */
        .btn-enviar {
            background-color: #740001; /* Burdeos */
            color: #eeba30; /* Dorado */
            border: 2px solid #d3a625;
            padding: 12px 24px;
            font-family: 'Georgia', serif;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            width: 100%;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .btn-enviar:hover {
            background-color: #eeba30;
            color: #740001;
            border-color: #740001;
            box-shadow: 0 0 12px #eeba30;
        }

        /* =========================================
           ADAPTACIÓN PARA MÓVILES (FORMULARIO)
           ========================================= */
        @media screen and (max-width: 600px) {
            body {
                padding: 15px;
                align-items: flex-start;
            }

            .pergamino {
                padding: 25px 15px; /* Menos margen en los bordes del pergamino */
            }

            h2 {
                font-size: 20px;
            }

            .opciones-radio {
                flex-direction: column; /* En lugar de estar uno al lado del otro, se apilan verticalmente */
                gap: 12px;
            }

            input[type="text"],
            input[type="number"],
            select,
            textarea {
                font-size: 16px; /* Evita el zoom automático en Safari/iOS */
                padding: 12px; /* Áreas táctiles más grandes */
            }
        }
    </style>
</head>
<body>

<div class="pergamino">
    <h2>Registro en el Libro de Honor</h2>
    <div class="subtitulo">Por favor, confirma tu asistencia antes de que la lechuza parta</div>

    <form action="https://formspree.io/f/mgojanjk" method="POST">

        <div class="grupo-campo">
            <label for="nombre">Nombre y Apellidos del invitado:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Ej. Harry Potter" required>
        </div>

        <div class="grupo-campo">
            <label>¿Asistirás al banquete de gala?</label>
            <div class="opciones-radio">
                <label>
                    <input type="radio" name="asistencia" value="Asistirá" checked required>
                    Acepto con honor
                </label>
                <label>
                    <input type="radio" name="asistencia" value="No Asistirá">
                    Lamento no poder asistir
                </label>
            </div>
        </div>

        <div class="grupo-campo">
            <label for="acompanantes">¿Cuántos magos/brujas te acompañan? (Incluyendo niños):</label>
            <input type="number" id="acompanantes" name="acompanantes" min="0" max="10" value="0">
        </div>

        <div class="grupo-campo">
            <label for="casa">¿A qué casa de Hogwarts perteneces? (Para tu mesa):</label>
            <select id="casa" name="casa_hogwarts" required>
                <option value="" disabled selected>Deja que el sombrero decida...</option>
                <option value="Gryffindor">Gryffindor (Valor y Coraje)</option>
                <option value="Slytherin">Slytherin (Ambición y Astucia)</option>
                <option value="Ravenclaw">Ravenclaw (Sabiduría e Ingenio)</option>
                <option value="Hufflepuff">Hufflepuff (Lealtad y Justicia)</option>
            </select>
        </div>

        <div class="grupo-campo">
            <label for="restricciones">¿Alguna restricción con las pociones o banquetes? (Alergias/Intolerancias/Vegano):</label>
            <textarea id="restricciones" name="restricciones_alimenticias" rows="3" placeholder="Ej. Alérgico a las mandrágoras, menú infantil, etc."></textarea>
        </div>

        <div class="grupo-campo">
            <label for="musica">¿Qué canción invocará tus mejores pasos en la pista de baile?</label>
            <input type="text" id="musica" name="cancion_sugerida" placeholder="Ej. El vals de las brujas">
        </div>

        <button type="submit" class="btn-enviar">Enviar Lechuza (Confirmar)</button>
    </form>
</div>

</body>
</html>
